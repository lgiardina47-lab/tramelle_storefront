# Esempio per nginx (Plesk): tutto il traffico va al processo Next su porta 3000.
# NON aggiungere un `location /_next/` che serva file da una directory vuota: genera 404 sul CSS.
#
# proxy_pass http://127.0.0.1:3000;  (o il socket upstream usato da PM2)

location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
