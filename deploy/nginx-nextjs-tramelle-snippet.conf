# Esempio per nginx (Plesk): traffico **pubblico** tramelle.com → Next **standalone** (porta da monorepo-default-ports STOREFRONT_PRODUCTION, es. 3020).
# Dev con HMR resta su 3000 (solo Docker `storefront`); non usare 3000 per il proxy del dominio.
# NON aggiungere un `location /_next/` che serva file da una directory vuota: genera 404 sul CSS.

location / {
    proxy_pass http://127.0.0.1:3020;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
