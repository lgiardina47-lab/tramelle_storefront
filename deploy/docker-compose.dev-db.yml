# Servizi locali per sviluppo Mercur (Postgres + Redis).
# Uso: docker compose -f deploy/docker-compose.dev-db.yml up -d
# DATABASE_URL in backend/.env: postgresql://medusa:medusa@127.0.0.1:5432/medusa
services:
  postgres:
    image: postgres:16-alpine
    container_name: marketplace-dev-postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: marketplace-dev-redis
    ports:
      - "6379:6379"
