# Stack Docker: build + avvio in **produzione** (niente HMR: meno CPU/RAM rispetto a `yarn dev`).
# Porte: 3000 (Next standalone) / 9000 (Medusa) / 7000 (admin) / 5173 (vendor) / 6379 / Meilisearch 7700
#   (vedi deploy/monorepo-default-ports.cjs).
# HMR in locale: avvia i singoli pacchetti fuori da Docker, es. `cd storefront && yarn dev`.
# Per admin/vendor su IP pubblico, in `.env` in root vedi commenti in admin-panel e vendor-panel.
#
# Avvio: docker compose up -d
# Log:   docker compose logs -f backend
# Stop:  docker compose down

name: tramelle

services:
  # Postgres in locale (stesso host Docker) — sostituisce Neon/Supabase per DATA_PATH persistente in volume.
  # Backup: `docker exec tramelle-postgres-1 pg_dump -U medusa medusa` (o da host su 127.0.0.1:5432)
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: always
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tramelle_dev_meili_master}
    volumes:
      - meilisearch-data:/meili_data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    image: node:20-bookworm-slim
    working_dir: /workspace/backend
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/backend/node_modules
    env_file:
      - ./backend/.env
    environment:
      PORT: "9000"
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tramelle_dev_meili_master}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq python3 make g++ git >/dev/null
        corepack enable
        NODE_ENV=development yarn install --non-interactive
        export NODE_ENV=production
        yarn build
        exec yarn start

  storefront:
    image: node:20-bookworm-slim
    working_dir: /workspace/storefront
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - storefront_node_modules:/workspace/storefront/node_modules
    env_file:
      - ./storefront/.env
    environment:
      NODE_ENV: production
      DOCKER: "1"
      # Stesso sorgente del blocco 3020 (`docker-compose.storefront-production.yml`) ma `dist` separato.
      TRAMELLE_NEXT_DIST_DIR: .next-compose
      # Parità con deploy: MEDUSA_* da `storefront/.env`.
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        export HOSTNAME=0.0.0.0
        export PORT=3000
        export TRAMELLE_NEXT_DIST_DIR=.next-compose
        export CI=1
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        NODE_ENV=development yarn install --non-interactive
        export NODE_ENV=production
        yarn build
        node scripts/sync-standalone-assets.mjs
        exec node .next-compose/standalone/server.js

  vendor-panel:
    image: node:20-bookworm-slim
    working_dir: /workspace/vendor-panel
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - vendor_node_modules:/workspace/vendor-panel/node_modules
    env_file:
      - ./vendor-panel/.env
    environment:
      NODE_ENV: production
      DOCKER: "1"
      PORT: "5173"
      VITE_MEDUSA_PROJECT: /workspace/backend
      VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BROWSER_BACKEND_URL:-http://localhost:9000}
      VITE_MEDUSA_STOREFRONT_URL: ${VITE_MEDUSA_BROWSER_STOREFRONT_URL:-http://localhost:3000}
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        export CI=1
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        NODE_ENV=development yarn install --non-interactive
        export NODE_ENV=production
        yarn build
        exec yarn start

  tramelle-admin:
    image: node:20-bookworm-slim
    working_dir: /workspace/admin-panel
    restart: always
    ports:
      - "7000:7000"
    volumes:
      - .:/workspace
      - admin_node_modules:/workspace/admin-panel/node_modules
    env_file:
      - ./admin-panel/.env
    environment:
      NODE_ENV: production
      DOCKER: "1"
      PORT: "7000"
      VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BROWSER_BACKEND_URL:-http://localhost:9000}
      VITE_MEDUSA_STOREFRONT_URL: ${VITE_MEDUSA_BROWSER_STOREFRONT_URL:-http://localhost:3000}
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        export CI=1
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        NODE_ENV=development yarn install --non-interactive
        export NODE_ENV=production
        yarn build && yarn build:preview
        exec yarn start

volumes:
  postgres-data:
  meilisearch-data:
  redis-data:
  backend_node_modules:
  storefront_node_modules:
  admin_node_modules:
  vendor_node_modules:
