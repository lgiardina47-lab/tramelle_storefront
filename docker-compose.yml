# Stack sviluppo con HMR: volumi sul monorepo, `yarn dev` / `medusa develop`.
# Porte fisse: 3000 / 9000 / 7000 / 5173 / 6379 (deploy/monorepo-default-ports.cjs); Meilisearch 7700.
# Tunnel SSH dal PC: mappa le stesse porte su localhost; Vite HMR (admin/vendor) usa ws → localhost.
# Se apri admin/vendor dal browser su IP pubblico (es. http://SERVER:7000), imposta nel file `.env` alla root:
#   VITE_MEDUSA_BROWSER_BACKEND_URL=http://SERVER:9000
#   VITE_MEDUSA_BROWSER_STOREFRONT_URL=http://SERVER:3000
# (altrimenti il bundle usa localhost e le API vanno al PC, non al server).
#
# Avvio: docker compose up -d
# Log:   docker compose logs -f backend
# Stop:  docker compose down

name: tramelle

services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: always
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tramelle_dev_meili_master}
    volumes:
      - meilisearch-data:/meili_data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    image: node:20-bookworm-slim
    working_dir: /workspace/backend
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/backend/node_modules
    env_file:
      - ./backend/.env
    environment:
      PORT: "9000"
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tramelle_dev_meili_master}
    depends_on:
      - redis
      - meilisearch
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq python3 make g++ git >/dev/null
        corepack enable
        yarn install
        yarn dev

  storefront:
    image: node:20-bookworm-slim
    working_dir: /workspace/storefront
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - storefront_node_modules:/workspace/storefront/node_modules
    env_file:
      - ./storefront/.env
    environment:
      NODE_ENV: development
      DOCKER: "1"
      # Parità con deploy Cloudflare: niente override di MEDUSA_* — tutto da `storefront/.env` (tipicamente https://api.tramelle.com).
      # Prima era forzato `backend:9000` e splash home: menu/catalogo diversi dalla produzione.
      NEXT_PUBLIC_COMING_SOON_HOME: "false"
      NEXT_PUBLIC_COMING_SOON_DEV_PREVIEW: "false"
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        yarn install
        yarn dev

  vendor-panel:
    image: node:20-bookworm-slim
    working_dir: /workspace/vendor-panel
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - vendor_node_modules:/workspace/vendor-panel/node_modules
    env_file:
      - ./vendor-panel/.env
    environment:
      NODE_ENV: development
      DOCKER: "1"
      PORT: "5173"
      VITE_MEDUSA_PROJECT: /workspace/backend
      VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BROWSER_BACKEND_URL:-http://localhost:9000}
      VITE_MEDUSA_STOREFRONT_URL: ${VITE_MEDUSA_BROWSER_STOREFRONT_URL:-http://localhost:3000}
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        yarn install
        yarn dev

  tramelle-admin:
    image: node:20-bookworm-slim
    working_dir: /workspace/admin-panel
    restart: always
    ports:
      - "7000:7000"
    volumes:
      - .:/workspace
      - admin_node_modules:/workspace/admin-panel/node_modules
    env_file:
      - ./admin-panel/.env
    environment:
      NODE_ENV: development
      DOCKER: "1"
      PORT: "7000"
      VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BROWSER_BACKEND_URL:-http://localhost:9000}
      VITE_MEDUSA_STOREFRONT_URL: ${VITE_MEDUSA_BROWSER_STOREFRONT_URL:-http://localhost:3000}
    depends_on:
      - backend
    command:
      - bash
      - -lc
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq git >/dev/null
        corepack enable
        yarn install
        yarn dev

volumes:
  meilisearch-data:
  redis-data:
  backend_node_modules:
  storefront_node_modules:
  admin_node_modules:
  vendor_node_modules:
